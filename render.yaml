# IMPORTANT: Root Directory must be (empty) — NOT "backend".
# The Python code imports from agents/, schemas/, simulation/, stadium/
# which are siblings of backend/, so repo root must be the working directory.
services:
  - type: web
    name: stadiumos-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: .
      - key: LLM_PROVIDER
        value: deepseek
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://stadiumos-navigator.vercel.app
      - key: PRODUCTION
        value: "true"
